name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run unit tests
        run: |
          pip install pytest pytest-tmp-files httpx
          python -m pytest tests/ -v \
            --ignore=tests/test_pr_workflow_integration.py \
            --ignore=tests/test_create_pr.py \
            --ignore=tests/test_hub_pr_workflow.py \
            --ignore=tests/test_feature_branch_workflow.py \
            --ignore=tests/test_simultaneous_prs.py \
            -x

  integration-stdio:
    name: "Integration: STDIO transport"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-tmp-files httpx

      - name: Run STDIO integration tests
        run: python -m pytest tests/integration/test_stdio.py -v

  integration-sse:
    name: "Integration: SSE transport"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-tmp-files httpx

      - name: Run SSE integration tests
        run: python -m pytest tests/integration/test_sse.py -v

  integration-full:
    name: "Integration: Full Suite"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-tmp-files httpx

      - name: Run full integration test suite
        run: python -m pytest tests/integration/test_full.py tests/integration/test_cache_staleness.py -v

  integration-web:
    name: "Integration: Web UI"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-tmp-files httpx

      - name: Run Web integration tests
        run: python -m pytest tests/web/ -v
